<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/></marker>
    <marker id="redarrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
    <marker id="greenarrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
  </defs>

  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">MCPShield — Runtime Defense Workflow</text>

  <!-- Incoming request -->
  <rect x="250" y="55" width="400" height="45" rx="10" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="450" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⬇️ Incoming JSON-RPC Tool Call</text>
  <line x1="450" y1="100" x2="450" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 1 -->
  <rect x="50" y="135" width="800" height="140" rx="12" fill="#e74c3c" filter="url(#shadow)" opacity="0.85"/>
  <text x="450" y="162" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Layer 1: STATIC PRE-DEPLOYMENT CHECK (at tool registration)</text>

  <rect x="70" y="175" width="230" height="40" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="185" y="200" text-anchor="middle" font-size="11" fill="white">🔍 NLP Classifier: hidden instructions</text>

  <rect x="320" y="175" width="230" height="40" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="435" y="200" text-anchor="middle" font-size="11" fill="white">🔤 Unicode: invisible chars, homoglyphs</text>

  <rect x="570" y="175" width="260" height="40" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="700" y="200" text-anchor="middle" font-size="11" fill="white">📋 Schema: capability vs permissions</text>

  <rect x="70" y="225" width="350" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="245" y="248" text-anchor="middle" font-size="11" fill="white">🔐 CryptoMCP: signature valid? hash matches?</text>

  <rect x="480" y="225" width="350" height="35" rx="6" fill="#ffeaa7" fill-opacity="0.3"/>
  <text x="655" y="248" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Result: APPROVE | REJECT | FLAG FOR REVIEW</text>

  <!-- Arrow with decision -->
  <line x1="350" y1="275" x2="150" y2="310" stroke="#e74c3c" stroke-width="2" marker-end="url(#redarrow)"/>
  <text x="200" y="298" font-size="10" fill="#e74c3c" font-weight="bold">REJECT</text>
  <line x1="450" y1="275" x2="450" y2="320" stroke="#2ecc71" stroke-width="2" marker-end="url(#greenarrow)"/>
  <text x="475" y="300" font-size="10" fill="#2ecc71" font-weight="bold">PASS</text>

  <!-- Reject box -->
  <rect x="60" y="310" width="180" height="35" rx="6" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="150" y="333" text-anchor="middle" font-size="12" fill="white" font-weight="bold">🚫 BLOCKED + ALERT</text>

  <!-- Layer 2 -->
  <rect x="50" y="325" width="800" height="130" rx="12" fill="#e67e22" filter="url(#shadow)" opacity="0.85"/>
  <text x="450" y="352" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Layer 2: RUNTIME BEHAVIORAL MONITOR (every invocation)</text>

  <rect x="70" y="365" width="230" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="185" y="388" text-anchor="middle" font-size="11" fill="white">📈 Behavioral profile matching</text>

  <rect x="320" y="365" width="230" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="435" y="388" text-anchor="middle" font-size="11" fill="white">🔒 Sensitive data flow tracking</text>

  <rect x="570" y="365" width="260" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="700" y="388" text-anchor="middle" font-size="11" fill="white">⏱️ Rate limiter + Anomaly score (ML)</text>

  <rect x="480" y="410" width="350" height="35" rx="6" fill="#ffeaa7" fill-opacity="0.3"/>
  <text x="655" y="433" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Result: ALLOW | THROTTLE | BLOCK | ESCALATE</text>

  <!-- Arrow -->
  <line x1="450" y1="455" x2="450" y2="490" stroke="#2ecc71" stroke-width="2" marker-end="url(#greenarrow)"/>

  <!-- Layer 3 -->
  <rect x="50" y="495" width="800" height="120" rx="12" fill="#2980b9" filter="url(#shadow)" opacity="0.85"/>
  <text x="450" y="522" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Layer 3: POLICY ENGINE (configurable YAML rules)</text>

  <rect x="70" y="535" width="230" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="185" y="557" text-anchor="middle" font-size="10" fill="white">external → no local_filesystem</text>

  <rect x="320" y="535" width="230" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="435" y="557" text-anchor="middle" font-size="10" fill="white">credential_access → human approval</text>

  <rect x="570" y="535" width="260" height="35" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="700" y="557" text-anchor="middle" font-size="10" fill="white">PII → verified_publisher only</text>

  <rect x="480" y="580" width="350" height="30" rx="6" fill="#ffeaa7" fill-opacity="0.3"/>
  <text x="655" y="600" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Result: EXECUTE | BLOCK | REQUEST APPROVAL</text>

  <!-- Final output -->
  <line x1="450" y1="615" x2="450" y2="645" stroke="#2ecc71" stroke-width="2" marker-end="url(#greenarrow)"/>

  <rect x="150" y="650" width="300" height="40" rx="10" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="300" y="675" text-anchor="middle" font-size="14" font-weight="bold" fill="white">✅ EXECUTE Tool Call</text>

  <rect x="500" y="650" width="300" height="40" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="650" y="675" text-anchor="middle" font-size="13" font-weight="bold" fill="#00cec9">📜 Merkle Audit Log Entry</text>
</svg>
