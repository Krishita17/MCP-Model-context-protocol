<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#764ba2"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f093fb"/><stop offset="100%" stop-color="#f5576c"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4facfe"/><stop offset="100%" stop-color="#00f2fe"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#43e97b"/><stop offset="100%" stop-color="#38f9d7"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">MCP Security Suite — System Architecture</text>

  <!-- AI Agent Layer -->
  <rect x="50" y="55" width="800" height="100" rx="12" fill="url(#g1)" filter="url(#shadow)" opacity="0.9"/>
  <text x="450" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="white">AI AGENT LAYER</text>
  <rect x="80" y="95" width="150" height="45" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="155" y="123" text-anchor="middle" font-size="13" fill="white">LangChain</text>
  <rect x="260" y="95" width="150" height="45" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="335" y="123" text-anchor="middle" font-size="13" fill="white">CrewAI</text>
  <rect x="440" y="95" width="150" height="45" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="515" y="123" text-anchor="middle" font-size="13" fill="white">AutoGen</text>
  <rect x="620" y="95" width="200" height="45" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="720" y="123" text-anchor="middle" font-size="13" fill="white">Custom Agents</text>

  <!-- Arrow -->
  <line x1="450" y1="155" x2="450" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="175" font-size="11" fill="#666">JSON-RPC</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/></marker></defs>

  <!-- MCPShield Layer -->
  <rect x="50" y="190" width="800" height="130" rx="12" fill="url(#g2)" filter="url(#shadow)" opacity="0.9"/>
  <text x="450" y="217" text-anchor="middle" font-size="15" font-weight="bold" fill="white">MCPShield INTERCEPTION LAYER</text>
  <rect x="70" y="230" width="230" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="185" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Layer 1: Static Scanner</text>
  <text x="185" y="272" text-anchor="middle" font-size="10" fill="white">NLP Detection • Unicode Analysis</text>
  <text x="185" y="288" text-anchor="middle" font-size="10" fill="white">Schema Validation • Crypto Check</text>
  <rect x="320" y="230" width="250" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="445" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Layer 2: Runtime Monitor</text>
  <text x="445" y="272" text-anchor="middle" font-size="10" fill="white">Behavioral ML • Data Flow Tracking</text>
  <text x="445" y="288" text-anchor="middle" font-size="10" fill="white">Rate Limiting • Anomaly Detection</text>
  <rect x="590" y="230" width="240" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="710" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Layer 3: Policy Engine</text>
  <text x="710" y="272" text-anchor="middle" font-size="10" fill="white">YAML Rules • HITL Enforcement</text>
  <text x="710" y="288" text-anchor="middle" font-size="10" fill="white">GDPR • EU AI Act • SOC 2</text>

  <!-- Arrow -->
  <line x1="450" y1="320" x2="450" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CryptoMCP Layer -->
  <rect x="50" y="355" width="800" height="130" rx="12" fill="url(#g3)" filter="url(#shadow)" opacity="0.9"/>
  <text x="450" y="382" text-anchor="middle" font-size="15" font-weight="bold" fill="white">CryptoMCP INTEGRITY LAYER</text>
  <rect x="70" y="395" width="180" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="160" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ed25519 Signing</text>
  <text x="160" y="437" text-anchor="middle" font-size="10" fill="white">Digital Signatures</text>
  <text x="160" y="453" text-anchor="middle" font-size="10" fill="white">PyNaCl / libsodium</text>
  <rect x="270" y="395" width="180" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="360" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SHA-256 Integrity</text>
  <text x="360" y="437" text-anchor="middle" font-size="10" fill="white">Hash Verification</text>
  <text x="360" y="453" text-anchor="middle" font-size="10" fill="white">Baseline Comparison</text>
  <rect x="470" y="395" width="180" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="560" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="white">X.509 PKI Auth</text>
  <text x="560" y="437" text-anchor="middle" font-size="10" fill="white">Trust Registry</text>
  <text x="560" y="453" text-anchor="middle" font-size="10" fill="white">Publisher Certificates</text>
  <rect x="670" y="395" width="160" height="75" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="750" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Merkle Audit</text>
  <text x="750" y="437" text-anchor="middle" font-size="10" fill="white">Tamper-Evident Logs</text>
  <text x="750" y="453" text-anchor="middle" font-size="10" fill="white">Compliance Records</text>

  <!-- Arrow -->
  <line x1="450" y1="485" x2="450" y2="515" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="505" font-size="11" fill="#666">Verified + Monitored MCP Traffic</text>

  <!-- MCP Server Layer -->
  <rect x="50" y="520" width="800" height="100" rx="12" fill="url(#g4)" filter="url(#shadow)" opacity="0.9"/>
  <text x="450" y="547" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">MCP SERVER LAYER (Signed Tools)</text>
  <rect x="80" y="560" width="160" height="45" rx="8" fill="white" fill-opacity="0.3"/>
  <text x="160" y="587" text-anchor="middle" font-size="12" fill="#1a1a2e">🗄️ Database Tool</text>
  <rect x="260" y="560" width="160" height="45" rx="8" fill="white" fill-opacity="0.3"/>
  <text x="340" y="587" text-anchor="middle" font-size="12" fill="#1a1a2e">📁 File Tool</text>
  <rect x="440" y="560" width="160" height="45" rx="8" fill="white" fill-opacity="0.3"/>
  <text x="520" y="587" text-anchor="middle" font-size="12" fill="#1a1a2e">🌐 API Tool</text>
  <rect x="620" y="560" width="200" height="45" rx="8" fill="white" fill-opacity="0.3"/>
  <text x="720" y="587" text-anchor="middle" font-size="12" fill="#1a1a2e">⚡ Code Execution</text>

  <!-- MCPoisoner label -->
  <rect x="50" y="640" width="260" height="30" rx="6" fill="#ff4757" filter="url(#shadow)"/>
  <text x="180" y="660" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔴 MCPoisoner — Red Team Testing</text>

  <rect x="330" y="640" width="260" height="30" rx="6" fill="#2ed573" filter="url(#shadow)"/>
  <text x="460" y="660" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🟢 MCPShield + CryptoMCP Defense</text>

  <rect x="610" y="640" width="240" height="30" rx="6" fill="#5352ed" filter="url(#shadow)"/>
  <text x="730" y="660" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔵 Governance Framework</text>
</svg>
